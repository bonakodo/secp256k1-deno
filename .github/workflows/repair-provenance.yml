name: Repair JSR provenance

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.9.2
      - name: Attach tarball-bound provenance
        run: >-
          deno run --frozen --lock=scripts/provenance.lock
          --allow-env --allow-net
          scripts/repair_jsr_provenance.ts
