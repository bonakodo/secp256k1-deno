name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    uses: ./.github/workflows/test.yml

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: denoland/setup-deno@v2
        with:
          deno-version: latest
      - name: Verify release tag
        shell: bash
        run: |
          version="$(deno eval 'console.log(JSON.parse(await Deno.readTextFile("deno.jsonc")).version)')"
          expected="v${version}"
          if [[ "$GITHUB_REF_NAME" != "$expected" ]]; then
            echo "::error::Release tag '$GITHUB_REF_NAME' does not match package version '$version' (expected '$expected')."
            exit 1
          fi
      - name: Validate package
        run: deno publish --dry-run
      - name: Publish package without the incompatible Deno attestation
        run: deno publish --no-provenance
      - name: Attach tarball-bound provenance
        run: >-
          deno run --frozen --lock=scripts/provenance.lock
          --allow-env --allow-net
          scripts/repair_jsr_provenance.ts
